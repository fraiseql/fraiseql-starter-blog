[project]
name        = "starter-blog"
version     = "1.0.0"
description = "Blog starter — posts, authors, tags, full-text search"

[fraiseql]
schema_file = "schema.json"
output_file = "schema.compiled.json"

[server]
host = "0.0.0.0"
port = 8080

[database]
url      = "${DATABASE_URL}"
pool_min = 2
pool_max = 20
ssl_mode = "prefer"
